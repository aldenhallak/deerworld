<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klipspringer World</title>
  <link rel="stylesheet" href="style.css">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <div id="app">
    <canvas id="gameCanvas"></canvas>

    <!-- Simple Join Overlay -->
    <div id="joinModal" class="modal">
      <form id="joinForm" class="join-box">
        <label for="usernameInput">Name:</label>
        <input type="text" id="usernameInput" placeholder="Pip" maxlength="16" required autofocus autocomplete="off">
        <button type="submit">Enter</button>
      </form>
    </div>

    <!-- Shop Catalog Popup Modal -->
    <div id="shopModal" class="modal hidden">
      <div class="shop-box">
        <div class="shop-header">
          <h2>Shop & Seeds</h2>
          <button type="button" id="btnCloseShop" class="close-btn">✕</button>
        </div>
        <div class="shop-balance">Your Balance: <span id="shopCoinsText">0</span> Coins</div>
        <div id="shopGrid" class="shop-grid">
          <!-- Populated dynamically by game.js -->
        </div>
      </div>
    </div>

    <!-- Leaderboards Popup Modal -->
    <div id="leaderboardModal" class="modal hidden">
      <div class="leaderboard-box">
        <div class="leaderboard-header">
          <h2>LEADERBOARDS</h2>
          <button type="button" id="btnCloseLeaderboard" class="close-btn">[X]</button>
        </div>
        <div class="leaderboard-tabs">
          <button type="button" class="tab-btn active" data-tab="fishing">[ Fishing ]</button>
          <button type="button" class="tab-btn" data-tab="frogger">[ Frogger ]</button>
          <button type="button" class="tab-btn" data-tab="course1">[ Course 1 ]</button>
          <button type="button" class="tab-btn" data-tab="course2">[ Mega ]</button>
          <button type="button" class="tab-btn" data-tab="coop">[ Co-op ]</button>
        </div>
        <div id="leaderboardContent" class="leaderboard-content">
          <!-- Populated dynamically by game.js -->
        </div>
      </div>
    </div>

    <!-- Minimal Chat Bar -->
    <div id="chatBar" class="chat-bar hidden">
      <div id="chatMessages" class="chat-log"></div>
      <form id="chatForm" class="chat-inputs">
        <input type="text" id="chatInput" placeholder="Type message..." maxlength="140" autocomplete="off">
        <button type="submit">Send</button>
      </form>
    </div>
  </div>

  <script src="js/config.js?v=23"></script>
  <script src="js/levels.js?v=23"></script>
  <script src="js/audio.js?v=23"></script>
  <script src="js/world.js?v=23"></script>
  <script src="js/render.js?v=23"></script>
  <script src="js/physics.js?v=23"></script>
  <script src="js/frogger.js?v=23"></script>
  <script src="js/fishing.js?v=23"></script>
  <script src="game.js?v=23"></script>
</body>
</html>
